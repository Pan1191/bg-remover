<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去背小工具 | BG Remover</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .upload-zone {
            border: 3px dashed #4a9eff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(74, 158, 255, 0.1);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #6bb3ff;
            background: rgba(74, 158, 255, 0.2);
        }
        .upload-zone input { display: none; }
        
        .preview-container {
            display: none;
            margin-top: 30px;
            gap: 20px;
        }
        .preview-box {
            flex: 1;
            text-align: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            background: repeating-conic-gradient(#333 0% 25%, #444 0% 50%) 50% / 20px 20px;
        }
        .preview-box h3 { margin-bottom: 10px; }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        .btn:hover { background: #6bb3ff; transform: translateY(-2px); }
        .btn:disabled { background: #555; cursor: not-allowed; transform: none; }
        .btn.download { background: #28a745; }
        .btn.download:hover { background: #34ce57; }
        
        .loading { display: none; text-align: center; margin-top: 20px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🖼️ 去背小工具</h1>
    <p class="subtitle">上載圖片，自動去背，即時下載</p>
    
    <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*">
        <p>📁 拖曳圖片到呢度，或者點擊上載</p>
        <p style="color: #666; font-size: 14px;">支援 JPG, PNG, WebP</p>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>處理中...</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="preview-container" id="previewContainer">
        <div class="preview-box">
            <h3>原圖</h3>
            <img id="originalPreview" src="" alt="Original">
        </div>
        <div class="preview-box">
            <h3>去背後</h3>
            <img id="resultPreview" src="" alt="Result">
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
        <button class="btn download" id="downloadBtn" style="display: none;">⬇️ 下載去背圖片</button>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const previewContainer = document.getElementById('previewContainer');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let resultBlob = null;

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                processFile(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processFile(file);
        });

        async function processFile(file) {
            error.style.display = 'none';
            loading.style.display = 'block';
            previewContainer.style.display = 'none';
            downloadBtn.style.display = 'none';
            
            // Show original preview
            originalPreview.src = URL.createObjectURL(file);
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch('/remove-bg', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('處理失敗，請再試一次');
                }
                
                resultBlob = await response.blob();
                resultPreview.src = URL.createObjectURL(resultBlob);
                
                previewContainer.style.display = 'flex';
                downloadBtn.style.display = 'inline-block';
            } catch (err) {
                error.textContent = '❌ ' + err.message;
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        downloadBtn.addEventListener('click', () => {
            if (resultBlob) {
                const url = URL.createObjectURL(resultBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'removed_bg.png';
                a.click();
                URL.revokeObjectURL(url);
            }
        });
    </script>
</body>
</html>
